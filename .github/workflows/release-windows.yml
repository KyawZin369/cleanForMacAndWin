name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: python -m pip install pillow

      - name: Vendor WinMole
        shell: bash
        run: sh scripts/setup_winmole_vendor.sh

      - name: Build Windows release zip
        run: powershell -ExecutionPolicy Bypass -File scripts/release_windows.ps1

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: khine-windows
          path: dist/windows/*.zip
